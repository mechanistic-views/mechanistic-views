<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 680 620" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .card-name { font-size: 13px; font-weight: 600; fill: #1e293b; }
      .card-desc { font-size: 10.5px; fill: #475569; font-weight: 500; }
    </style>
    <marker id="net-arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- ══════ Column 1: Graph cluster (left) ══════ -->
  <rect x="30" y="40" width="170" height="44" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.7" stroke-width="2"/>
  <text x="115" y="58" text-anchor="middle" class="card-name">Directed Graph</text>
  <text x="115" y="74" text-anchor="middle" class="card-desc">Object view</text>

  <rect x="30" y="120" width="170" height="44" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.7" stroke-width="2"/>
  <text x="115" y="138" text-anchor="middle" class="card-name">Causal Graph</text>
  <text x="115" y="154" text-anchor="middle" class="card-desc">Object &amp; Role views</text>

  <rect x="30" y="200" width="170" height="44" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.7" stroke-width="2"/>
  <text x="115" y="218" text-anchor="middle" class="card-name">Role Graph</text>
  <text x="115" y="234" text-anchor="middle" class="card-desc">Role view</text>

  <!-- Standalone views below graph cluster -->
  <rect x="30" y="300" width="170" height="44" rx="8" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.7" stroke-width="2"/>
  <text x="115" y="318" text-anchor="middle" class="card-name">Measurement Algebra</text>
  <text x="115" y="334" text-anchor="middle" class="card-desc">Perspectival view</text>

  <rect x="30" y="380" width="170" height="44" rx="8" fill="#f43f5e" fill-opacity="0.08" stroke="#f43f5e" stroke-opacity="0.7" stroke-width="2"/>
  <text x="115" y="398" text-anchor="middle" class="card-name">Model Theory</text>
  <text x="115" y="414" text-anchor="middle" class="card-desc">Instrumental view</text>

  <!-- ══════ Column 2: Geometric cluster (center) ══════ -->
  <rect x="250" y="40" width="170" height="44" rx="8" fill="#64748b" fill-opacity="0.06" stroke="#64748b" stroke-opacity="0.6" stroke-width="2"/>
  <text x="335" y="58" text-anchor="middle" class="card-name">Linear Projection</text>
  <text x="335" y="74" text-anchor="middle" class="card-desc">logit lens, tuned lens</text>

  <rect x="250" y="120" width="170" height="44" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.7" stroke-width="2"/>
  <text x="335" y="138" text-anchor="middle" class="card-name">Grassmannian</text>
  <text x="335" y="154" text-anchor="middle" class="card-desc">Subspace view</text>

  <rect x="250" y="200" width="170" height="44" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.7" stroke-width="2"/>
  <text x="335" y="218" text-anchor="middle" class="card-name">Fiber Bundle Quotient</text>
  <text x="335" y="234" text-anchor="middle" class="card-desc">Structural view</text>

  <rect x="250" y="300" width="170" height="44" rx="8" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.7" stroke-width="2"/>
  <text x="335" y="318" text-anchor="middle" class="card-name">Whitney Stratification</text>
  <text x="335" y="334" text-anchor="middle" class="card-desc">Stratified view</text>

  <!-- ══════ Column 3: Dynamical + Dictionary (right) ══════ -->
  <rect x="480" y="40" width="170" height="44" rx="8" fill="#64748b" fill-opacity="0.06" stroke="#64748b" stroke-opacity="0.6" stroke-width="2"/>
  <text x="565" y="58" text-anchor="middle" class="card-name">Dictionary</text>
  <text x="565" y="74" text-anchor="middle" class="card-desc">sparse autoencoders</text>

  <rect x="480" y="200" width="170" height="44" rx="8" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.7" stroke-width="2"/>
  <text x="565" y="218" text-anchor="middle" class="card-name">Dynamical System</text>
  <text x="565" y="234" text-anchor="middle" class="card-desc">Process view</text>

  <!-- ══════ Arrows ══════ -->

  <!-- Directed Graph → Causal Graph -->
  <path d="M 115 84 L 115 116" fill="none" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#net-arrow)"/>

  <!-- Causal Graph → Role Graph -->
  <path d="M 115 164 L 115 196" fill="none" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#net-arrow)"/>

  <!-- Linear Projection → Grassmannian -->
  <path d="M 335 84 L 335 116" fill="none" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#net-arrow)"/>

  <!-- Dictionary → Grassmannian -->
  <path d="M 565 84 C 565 105, 450 120, 424 138" fill="none" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#net-arrow)"/>

  <!-- Grassmannian → Fiber Bundle -->
  <path d="M 335 164 L 335 196" fill="none" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#net-arrow)"/>

  <!-- Grassmannian → Whitney Stratification -->
  <path d="M 260 164 C 225 210, 235 260, 265 296" fill="none" stroke="#94a3b8" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#net-arrow)"/>

  <!-- Fiber Bundle → Whitney Stratification -->
  <path d="M 335 244 L 335 296" fill="none" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#net-arrow)"/>

  <!-- Dynamical System → Whitney Stratification -->
  <path d="M 565 244 C 565 265, 450 280, 424 296" fill="none" stroke="#94a3b8" stroke-opacity="0.5" stroke-width="1.5" marker-end="url(#net-arrow)"/>

  <!-- ══════ Cross-cutting frameworks (bottom row) ══════ -->
  <text x="340" y="455" text-anchor="middle" font-size="11" fill="#64748b" font-weight="600" letter-spacing="0.5">CROSS-CUTTING FRAMEWORKS</text>

  <rect x="30" y="470" width="190" height="44" rx="8" fill="#64748b" fill-opacity="0.04" stroke="#64748b" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="125" y="488" text-anchor="middle" class="card-name">Information Theory</text>
  <text x="125" y="504" text-anchor="middle" class="card-desc">Object, Role, Subspace views</text>

  <rect x="245" y="470" width="190" height="44" rx="8" fill="#64748b" fill-opacity="0.04" stroke="#64748b" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="340" y="488" text-anchor="middle" class="card-name">Category Theory</text>
  <text x="340" y="504" text-anchor="middle" class="card-desc">Role &amp; Structural views</text>

  <rect x="460" y="470" width="190" height="44" rx="8" fill="#64748b" fill-opacity="0.04" stroke="#64748b" stroke-opacity="0.5" stroke-width="1.5" stroke-dasharray="5,3"/>
  <text x="555" y="488" text-anchor="middle" class="card-name">Representation Theory</text>
  <text x="555" y="504" text-anchor="middle" class="card-desc">Subspace &amp; Structural views</text>

  <!-- Bottom tagline -->
  <text x="340" y="558" text-anchor="middle" font-size="12" fill="#475569" font-weight="600" font-style="italic">Arrows show dependency. Colored borders match view family.</text>
  <text x="340" y="576" text-anchor="middle" font-size="12" fill="#475569" font-weight="600" font-style="italic">Gray: method-level tools. Dashed: cross-cutting frameworks.</text>
</svg>
