<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 770" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .col-header { font-size: 13px; font-weight: 600; fill: #64748b; text-transform: uppercase; letter-spacing: 1px; }
      .fam-label { font-size: 12px; font-weight: 600; letter-spacing: 0.3px; }
      .card-name { font-size: 13px; font-weight: 600; fill: #1e293b; }
      .card-desc { font-size: 10px; fill: #475569; }
    </style>
  </defs>

  <!-- Column headers -->
  <text x="165" y="24" text-anchor="middle" class="col-header">Views</text>
  <text x="720" y="24" text-anchor="middle" class="col-header">Formalism</text>

  <!-- ══════ LEFT: View family boxes ══════ -->

  <!-- Pragmatic -->
  <rect x="40" y="48" width="250" height="68" rx="12" fill="#f43f5e" fill-opacity="0.08" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="2"/>
  <text x="165" y="42" text-anchor="middle" class="fam-label" fill="#f43f5e">Pragmatic</text>
  <rect x="60" y="60" width="210" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#f43f5e" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="78" text-anchor="middle" class="card-name">Instrumental</text>
  <text x="165" y="94" text-anchor="middle" class="card-desc">useful predictions, not real objects</text>

  <!-- Methodological -->
  <rect x="40" y="146" width="250" height="68" rx="12" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="2"/>
  <text x="165" y="140" text-anchor="middle" class="fam-label" fill="#f59e0b">Methodological</text>
  <rect x="60" y="158" width="210" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="176" text-anchor="middle" class="card-name">Perspectival</text>
  <text x="165" y="192" text-anchor="middle" class="card-desc">methods as partial projections</text>

  <!-- Identity -->
  <rect x="40" y="250" width="250" height="130" rx="12" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="2"/>
  <text x="165" y="244" text-anchor="middle" class="fam-label" fill="#7c3aed">Identity</text>
  <rect x="60" y="262" width="210" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="280" text-anchor="middle" class="card-name">Object</text>
  <text x="165" y="296" text-anchor="middle" class="card-desc">concrete parts: heads, neurons</text>
  <rect x="60" y="324" width="210" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="342" text-anchor="middle" class="card-name">Role</text>
  <text x="165" y="358" text-anchor="middle" class="card-desc">functional roles, multiply realized</text>

  <!-- Mathematical -->
  <rect x="40" y="416" width="250" height="130" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2"/>
  <text x="165" y="410" text-anchor="middle" class="fam-label" fill="#3b82f6">Mathematical</text>
  <rect x="60" y="428" width="210" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="446" text-anchor="middle" class="card-name">Subspace</text>
  <text x="165" y="462" text-anchor="middle" class="card-desc">causal subspaces on Gr(k, d)</text>
  <rect x="60" y="490" width="210" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="508" text-anchor="middle" class="card-name">Structural</text>
  <text x="165" y="524" text-anchor="middle" class="card-desc">gauge orbits, holonomy</text>

  <!-- Process -->
  <rect x="40" y="582" width="250" height="130" rx="12" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="2"/>
  <text x="165" y="576" text-anchor="middle" class="fam-label" fill="#14b8a6">Process</text>
  <rect x="60" y="594" width="210" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="612" text-anchor="middle" class="card-name">Process</text>
  <text x="165" y="628" text-anchor="middle" class="card-desc">formation trajectories</text>
  <rect x="60" y="656" width="210" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="165" y="674" text-anchor="middle" class="card-name">Stratified</text>
  <text x="165" y="690" text-anchor="middle" class="card-desc">strata with varying identity</text>

  <!-- ══════ RIGHT: Formalism cards ══════ -->

  <rect x="620" y="61" width="210" height="42" rx="8" fill="#f43f5e" fill-opacity="0.08" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="87" text-anchor="middle" class="card-name">Predictive models</text>

  <rect x="620" y="143" width="210" height="48" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="165" text-anchor="middle" class="card-name">Causal graphs</text>
  <text x="725" y="181" text-anchor="middle" class="card-desc">SCMs, causal abstraction</text>

  <rect x="620" y="228" width="210" height="48" rx="8" fill="#64748b" fill-opacity="0.08" stroke="#64748b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="250" text-anchor="middle" class="card-name">Category theory</text>
  <text x="725" y="266" text-anchor="middle" class="card-desc">functors, natural transformations</text>

  <rect x="620" y="313" width="210" height="48" rx="8" fill="#64748b" fill-opacity="0.08" stroke="#64748b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="335" text-anchor="middle" class="card-name">Information theory</text>
  <text x="725" y="351" text-anchor="middle" class="card-desc">mutual information, capacity</text>

  <rect x="620" y="398" width="210" height="48" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="420" text-anchor="middle" class="card-name">Grassmannian</text>
  <text x="725" y="436" text-anchor="middle" class="card-desc">Gr(k, d), geodesics, projections</text>

  <rect x="620" y="483" width="210" height="48" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="505" text-anchor="middle" class="card-name">Fiber bundles</text>
  <text x="725" y="521" text-anchor="middle" class="card-desc">parallel transport, holonomy</text>

  <rect x="620" y="568" width="210" height="48" rx="8" fill="#64748b" fill-opacity="0.08" stroke="#64748b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="590" text-anchor="middle" class="card-name">Representation theory</text>
  <text x="725" y="606" text-anchor="middle" class="card-desc">group reps, equivariance</text>

  <rect x="620" y="653" width="210" height="48" rx="8" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="675" text-anchor="middle" class="card-name">Dynamical systems</text>
  <text x="725" y="691" text-anchor="middle" class="card-desc">phase portraits, attractors, bifurcations</text>

  <!-- ══════ Connections ══════ -->

  <!-- Instrumental → Predictive models -->
  <path d="M 290 82 C 420 82, 520 82, 620 82" fill="none" stroke="#f43f5e" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Object → Causal graphs -->
  <path d="M 290 280 C 420 275, 520 167, 620 167" fill="none" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="2"/>
  <!-- Object → Information theory -->
  <path d="M 290 288 C 420 300, 520 337, 620 337" fill="none" stroke="#7c3aed" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Role → Causal graphs -->
  <path d="M 290 342 C 420 330, 520 169, 620 169" fill="none" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Role → Category theory -->
  <path d="M 290 346 C 420 346, 520 252, 620 252" fill="none" stroke="#64748b" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Role → Information theory -->
  <path d="M 290 350 C 420 355, 520 339, 620 339" fill="none" stroke="#7c3aed" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Subspace → Grassmannian -->
  <path d="M 290 446 C 420 446, 520 422, 620 422" fill="none" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="2.5"/>
  <!-- Subspace → Information theory -->
  <path d="M 290 442 C 420 430, 520 339, 620 339" fill="none" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1.5"/>
  <!-- Subspace → Representation theory -->
  <path d="M 290 454 C 420 470, 520 592, 620 592" fill="none" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Structural → Fiber bundles -->
  <path d="M 290 508 C 420 508, 520 507, 620 507" fill="none" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="2.5"/>
  <!-- Structural → Representation theory -->
  <path d="M 290 516 C 420 530, 520 594, 620 594" fill="none" stroke="#3b82f6" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Process → Dynamical systems -->
  <path d="M 290 616 C 420 616, 520 677, 620 677" fill="none" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Stratified → Dynamical systems -->
  <path d="M 290 678 C 420 678, 520 679, 620 679" fill="none" stroke="#14b8a6" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Bottom tagline -->
  <text x="450" y="745" text-anchor="middle" font-size="12.5" fill="#64748b" font-style="italic">Views prescribe formalisms. Gray cards are shared across family boundaries.</text>
</svg>
