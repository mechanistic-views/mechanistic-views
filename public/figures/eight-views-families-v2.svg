<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1130 405" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .fam-label { font-size: 13px; font-weight: 700; letter-spacing: 0.3px; }
      .card-name { font-size: 13px; font-weight: 600; fill: #1e293b; }
      .card-desc { font-size: 10.5px; fill: #475569; font-weight: 500; }
      .edge-label { font-size: 11px; fill: #475569; font-weight: 600; font-style: italic; }
      .cross-label { font-size: 12px; fill: #1e293b; font-weight: 700; }
    </style>
    <marker id="arr-purple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#7c3aed"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#3b82f6"/>
    </marker>
    <marker id="arr-teal" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#14b8a6"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#64748b"/>
    </marker>
    <marker id="arr-gray-rev" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="7 0, 0 2.5, 7 5" fill="#64748b"/>
    </marker>
  </defs>

  <!-- ══════ Identity Family ══════ -->
  <rect x="40" y="48" width="230" height="155" rx="12" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="2"/>
  <text x="155" y="42" text-anchor="middle" class="fam-label" fill="#7c3aed">Identity</text>

  <rect x="58" y="60" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="155" y="78" text-anchor="middle" class="card-name">Object</text>
  <text x="155" y="94" text-anchor="middle" class="card-desc">concrete parts: heads, neurons</text>

  <line x1="155" y1="104" x2="155" y2="126" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="176" y="119" class="edge-label">inflation risk</text>

  <rect x="58" y="130" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="155" y="148" text-anchor="middle" class="card-name">Role</text>
  <text x="155" y="164" text-anchor="middle" class="card-desc">functional roles, multiply realized</text>

  <!-- Identity → Mathematical arrow -->
  <line x1="270" y1="125" x2="447" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="358" y="113" text-anchor="middle" class="cross-label">components vs. geometry</text>

  <!-- ══════ Mathematical Family ══════ -->
  <rect x="450" y="48" width="230" height="155" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2"/>
  <text x="565" y="42" text-anchor="middle" class="fam-label" fill="#3b82f6">Mathematical</text>

  <rect x="468" y="60" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="565" y="78" text-anchor="middle" class="card-name">Subspace</text>
  <text x="565" y="94" text-anchor="middle" class="card-desc">causal subspaces on Gr(k, d)</text>

  <line x1="565" y1="104" x2="565" y2="126" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="586" y="119" class="edge-label">gauge question</text>

  <rect x="468" y="130" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="565" y="148" text-anchor="middle" class="card-name">Structural</text>
  <text x="565" y="164" text-anchor="middle" class="card-desc">invariant weight structure</text>

  <!-- Mathematical → Process arrow -->
  <line x1="680" y1="125" x2="857" y2="125" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="768" y="113" text-anchor="middle" class="cross-label">state vs. trajectory</text>

  <!-- ══════ Process Family ══════ -->
  <rect x="860" y="48" width="230" height="155" rx="12" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="2"/>
  <text x="975" y="42" text-anchor="middle" class="fam-label" fill="#14b8a6">Process</text>

  <rect x="878" y="60" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="975" y="78" text-anchor="middle" class="card-name">Process</text>
  <text x="975" y="94" text-anchor="middle" class="card-desc">formation trajectories</text>

  <line x1="975" y1="104" x2="975" y2="126" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="996" y="119" class="edge-label">resolution</text>

  <rect x="878" y="130" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="975" y="148" text-anchor="middle" class="card-name">Stratified</text>
  <text x="975" y="164" text-anchor="middle" class="card-desc">strata with varying identity</text>

  <!-- Divider line -->
  <line x1="60" y1="232" x2="1070" y2="232" stroke="#cbd5e1" stroke-width="1"/>

  <!-- ══════ Methodological Family ══════ -->
  <rect x="195" y="262" width="230" height="68" rx="12" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="2"/>
  <text x="310" y="256" text-anchor="middle" class="fam-label" fill="#f59e0b">Methodological</text>

  <rect x="213" y="274" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#f59e0b" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="310" y="292" text-anchor="middle" class="card-name">Perspectival</text>
  <text x="310" y="308" text-anchor="middle" class="card-desc">methods as partial projections</text>

  <!-- "method vs. utility" bidirectional arrow -->
  <text x="565" y="286" text-anchor="middle" class="cross-label">method vs. utility</text>
  <line x1="428" y1="296" x2="702" y2="296" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-start="url(#arr-gray-rev)" marker-end="url(#arr-gray)"/>

  <!-- ══════ Pragmatic Family ══════ -->
  <rect x="705" y="262" width="230" height="68" rx="12" fill="#f43f5e" fill-opacity="0.08" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="2"/>
  <text x="820" y="256" text-anchor="middle" class="fam-label" fill="#f43f5e">Pragmatic</text>

  <rect x="723" y="274" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#f43f5e" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="820" y="292" text-anchor="middle" class="card-name">Instrumental</text>
  <text x="820" y="308" text-anchor="middle" class="card-desc">useful predictions, not real objects</text>

  <!-- Bottom taglines -->
  <text x="565" y="365" text-anchor="middle" font-size="13" fill="#475569" font-weight="600" font-style="italic">The first six views make metaphysical commitments.</text>
  <text x="565" y="385" text-anchor="middle" font-size="13" fill="#475569" font-weight="600" font-style="italic">The perspectival and instrumental views are skeptical positions.</text>
</svg>
