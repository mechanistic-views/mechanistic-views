<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 540" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .col-header { font-size: 13px; font-weight: 600; fill: #64748b; text-transform: uppercase; letter-spacing: 1px; }
      .card-name { font-size: 13px; font-weight: 600; fill: #1e293b; }
      .card-desc { font-size: 10px; fill: #475569; }
      .arrow-label { font-size: 11px; fill: #64748b; font-weight: 500; }
    </style>
    <marker id="arrowhead" markerWidth="8" markerHeight="6" refX="8" refY="3" orient="auto">
      <polygon points="0 0, 8 3, 0 6" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Column headers -->
  <text x="175" y="24" text-anchor="middle" class="col-header">Views</text>
  <text x="725" y="24" text-anchor="middle" class="col-header">Formalism</text>

  <!-- Arrow: increasing ontological commitment (bottom to top) -->
  <line x1="38" y1="462" x2="38" y2="70" stroke="#94a3b8" stroke-width="1.5" marker-end="url(#arrowhead)"/>
  <text x="18" y="266" text-anchor="middle" class="arrow-label" transform="rotate(-90, 18, 266)">Increasing ontological commitment</text>

  <!-- ══════ LEFT: Views in ontological order (bottom to top) ══════ -->

  <!-- 1. Instrumental (bottom, least committed) -->
  <rect x="70" y="440" width="210" height="44" rx="8" fill="#f43f5e" fill-opacity="0.08" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="175" y="458" text-anchor="middle" class="card-name">Instrumental</text>
  <text x="175" y="474" text-anchor="middle" class="card-desc">useful predictions, not real objects</text>

  <!-- 2. Perspectival -->
  <rect x="70" y="384" width="210" height="44" rx="8" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="175" y="402" text-anchor="middle" class="card-name">Perspectival</text>
  <text x="175" y="418" text-anchor="middle" class="card-desc">methods as partial projections</text>

  <!-- 3. Object -->
  <rect x="70" y="328" width="210" height="44" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="175" y="346" text-anchor="middle" class="card-name">Object</text>
  <text x="175" y="362" text-anchor="middle" class="card-desc">concrete parts: heads, neurons</text>

  <!-- 4. Role -->
  <rect x="70" y="272" width="210" height="44" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="175" y="290" text-anchor="middle" class="card-name">Role</text>
  <text x="175" y="306" text-anchor="middle" class="card-desc">functional roles, multiply realized</text>

  <!-- 5. Subspace -->
  <rect x="70" y="216" width="210" height="44" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="175" y="234" text-anchor="middle" class="card-name">Subspace</text>
  <text x="175" y="250" text-anchor="middle" class="card-desc">causal subspaces on Gr(k, d)</text>

  <!-- 6. Structural -->
  <rect x="70" y="160" width="210" height="44" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="175" y="178" text-anchor="middle" class="card-name">Structural</text>
  <text x="175" y="194" text-anchor="middle" class="card-desc">invariant weight structure</text>

  <!-- 7. Process -->
  <rect x="70" y="104" width="210" height="44" rx="8" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="175" y="122" text-anchor="middle" class="card-name">Process</text>
  <text x="175" y="138" text-anchor="middle" class="card-desc">formation trajectories</text>

  <!-- 8. Stratified (top, most committed) -->
  <rect x="70" y="48" width="210" height="44" rx="8" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="175" y="66" text-anchor="middle" class="card-name">Stratified</text>
  <text x="175" y="82" text-anchor="middle" class="card-desc">strata with varying identity</text>

  <!-- ══════ RIGHT: Formalisms (ordered to minimize crossings) ══════ -->

  <!-- Predictive models (→ Instrumental) -->
  <rect x="620" y="440" width="210" height="44" rx="8" fill="#f43f5e" fill-opacity="0.08" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="466" text-anchor="middle" class="card-name">Predictive models</text>

  <!-- Causal graphs (→ Object, Role) -->
  <rect x="620" y="384" width="210" height="44" rx="8" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="402" text-anchor="middle" class="card-name">Causal graphs</text>
  <text x="725" y="418" text-anchor="middle" class="card-desc">SCMs, causal abstraction</text>

  <!-- Information theory (→ Object, Role, Subspace) -->
  <rect x="620" y="328" width="210" height="44" rx="8" fill="#64748b" fill-opacity="0.08" stroke="#64748b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="346" text-anchor="middle" class="card-name">Information theory</text>
  <text x="725" y="362" text-anchor="middle" class="card-desc">mutual information, capacity</text>

  <!-- Category theory (→ Role) -->
  <rect x="620" y="272" width="210" height="44" rx="8" fill="#64748b" fill-opacity="0.08" stroke="#64748b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="290" text-anchor="middle" class="card-name">Category theory</text>
  <text x="725" y="306" text-anchor="middle" class="card-desc">functors, natural transformations</text>

  <!-- Grassmannian (→ Subspace) -->
  <rect x="620" y="216" width="210" height="44" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="234" text-anchor="middle" class="card-name">Grassmannian</text>
  <text x="725" y="250" text-anchor="middle" class="card-desc">Gr(k, d), geodesics, projections</text>

  <!-- Representation theory (→ Subspace, Structural) -->
  <rect x="620" y="160" width="210" height="44" rx="8" fill="#64748b" fill-opacity="0.08" stroke="#64748b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="178" text-anchor="middle" class="card-name">Representation theory</text>
  <text x="725" y="194" text-anchor="middle" class="card-desc">group reps, equivariance</text>

  <!-- Fiber bundles (→ Structural) -->
  <rect x="620" y="104" width="210" height="44" rx="8" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="122" text-anchor="middle" class="card-name">Fiber bundles</text>
  <text x="725" y="138" text-anchor="middle" class="card-desc">parallel transport, holonomy</text>

  <!-- Dynamical systems (→ Process, Stratified) -->
  <rect x="620" y="48" width="210" height="44" rx="8" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="725" y="66" text-anchor="middle" class="card-name">Dynamical systems</text>
  <text x="725" y="82" text-anchor="middle" class="card-desc">phase portraits, attractors, bifurcations</text>

  <!-- ══════ Connections ══════ -->

  <!-- Instrumental → Predictive models (horizontal) -->
  <path d="M 280 462 C 400 462, 520 462, 620 462" fill="none" stroke="#f43f5e" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Object → Causal graphs -->
  <path d="M 280 346 C 400 346, 520 406, 620 406" fill="none" stroke="#7c3aed" stroke-opacity="0.3" stroke-width="2"/>
  <!-- Object → Information theory (horizontal) -->
  <path d="M 280 354 C 400 354, 520 350, 620 350" fill="none" stroke="#64748b" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Role → Causal graphs -->
  <path d="M 280 290 C 400 310, 520 408, 620 408" fill="none" stroke="#7c3aed" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Role → Category theory (horizontal) -->
  <path d="M 280 294 C 400 294, 520 294, 620 294" fill="none" stroke="#64748b" stroke-opacity="0.25" stroke-width="1.5"/>
  <!-- Role → Information theory -->
  <path d="M 280 298 C 400 310, 520 348, 620 348" fill="none" stroke="#64748b" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Subspace → Grassmannian (horizontal) -->
  <path d="M 280 238 C 400 238, 520 238, 620 238" fill="none" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="2.5"/>
  <!-- Subspace → Information theory -->
  <path d="M 280 244 C 400 264, 520 346, 620 346" fill="none" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1.5"/>
  <!-- Subspace → Representation theory -->
  <path d="M 280 232 C 400 220, 520 184, 620 184" fill="none" stroke="#3b82f6" stroke-opacity="0.15" stroke-width="1.5"/>

  <!-- Structural → Fiber bundles -->
  <path d="M 280 178 C 400 170, 520 128, 620 128" fill="none" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="2.5"/>
  <!-- Structural → Representation theory (horizontal) -->
  <path d="M 280 186 C 400 186, 520 182, 620 182" fill="none" stroke="#3b82f6" stroke-opacity="0.18" stroke-width="1.5"/>

  <!-- Process → Dynamical systems -->
  <path d="M 280 122 C 400 112, 520 72, 620 72" fill="none" stroke="#14b8a6" stroke-opacity="0.3" stroke-width="2"/>

  <!-- Stratified → Dynamical systems (horizontal) -->
  <path d="M 280 70 C 400 70, 520 70, 620 70" fill="none" stroke="#14b8a6" stroke-opacity="0.25" stroke-width="1.5"/>

  <!-- Bottom tagline -->
  <text x="450" y="520" text-anchor="middle" font-size="12.5" fill="#64748b" font-style="italic">Views ordered by ontological commitment. Gray cards are shared across families.</text>
</svg>
