<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 900 580" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .card-name { font-size: 13px; font-weight: 600; fill: #1e293b; }
      .card-desc { font-size: 10.5px; fill: #475569; font-weight: 500; }
      .tier-label { font-size: 12px; font-weight: 600; fill: #94a3b8; letter-spacing: 0.5px; }
    </style>
    <marker id="dep-arrow" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#94a3b8"/>
    </marker>
  </defs>

  <!-- Tier labels (right side) -->
  <text x="860" y="102" text-anchor="end" class="tier-label">ACCESSIBLE</text>
  <text x="860" y="262" text-anchor="end" class="tier-label">GRAPH THEORY</text>
  <text x="860" y="382" text-anchor="end" class="tier-label">DIFFERENTIAL</text>
  <text x="860" y="397" text-anchor="end" class="tier-label">GEOMETRY</text>
  <text x="860" y="502" text-anchor="end" class="tier-label">TOPOLOGY</text>

  <!-- Tier background bands -->
  <rect x="30" y="50" width="790" height="140" rx="6" fill="#64748b" fill-opacity="0.03"/>
  <rect x="30" y="230" width="790" height="80" rx="6" fill="#7c3aed" fill-opacity="0.03"/>
  <rect x="30" y="350" width="790" height="80" rx="6" fill="#3b82f6" fill-opacity="0.03"/>
  <rect x="30" y="470" width="790" height="80" rx="6" fill="#14b8a6" fill-opacity="0.03"/>

  <!-- ══════ Tier 1: Accessible ══════ -->

  <!-- View-level accessible formalisms -->
  <rect x="280" y="62" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="377" y="80" text-anchor="middle" class="card-name">Model Theory</text>
  <text x="377" y="96" text-anchor="middle" class="card-desc">Instrumental view</text>

  <rect x="510" y="62" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="607" y="80" text-anchor="middle" class="card-name">Measurement Algebra</text>
  <text x="607" y="96" text-anchor="middle" class="card-desc">Perspectival view</text>

  <!-- Method-level tools -->
  <rect x="50" y="120" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#64748b" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="147" y="138" text-anchor="middle" class="card-name">Linear Projection</text>
  <text x="147" y="154" text-anchor="middle" class="card-desc">logit lens, tuned lens</text>

  <rect x="280" y="120" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#64748b" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="377" y="138" text-anchor="middle" class="card-name">Linear Classifier</text>
  <text x="377" y="154" text-anchor="middle" class="card-desc">linear probing</text>

  <rect x="510" y="120" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#64748b" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="607" y="138" text-anchor="middle" class="card-name">Dictionary</text>
  <text x="607" y="154" text-anchor="middle" class="card-desc">sparse autoencoders</text>

  <!-- ══════ Tier 2: Graph Theory ══════ -->

  <rect x="50" y="242" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="147" y="260" text-anchor="middle" class="card-name">Directed Graph</text>
  <text x="147" y="276" text-anchor="middle" class="card-desc">Object view</text>

  <rect x="280" y="242" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="377" y="260" text-anchor="middle" class="card-name">Causal Graph</text>
  <text x="377" y="276" text-anchor="middle" class="card-desc">causal scrubbing, abstraction</text>

  <rect x="510" y="242" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="607" y="260" text-anchor="middle" class="card-name">Role Graph</text>
  <text x="607" y="276" text-anchor="middle" class="card-desc">Role view</text>

  <!-- ══════ Tier 3: Differential Geometry ══════ -->

  <rect x="50" y="362" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="147" y="380" text-anchor="middle" class="card-name">Grassmannian</text>
  <text x="147" y="396" text-anchor="middle" class="card-desc">Subspace view</text>

  <rect x="280" y="362" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="377" y="380" text-anchor="middle" class="card-name">Fiber Bundle Quotient</text>
  <text x="377" y="396" text-anchor="middle" class="card-desc">Structural view</text>

  <rect x="510" y="362" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="607" y="380" text-anchor="middle" class="card-name">Dynamical System</text>
  <text x="607" y="396" text-anchor="middle" class="card-desc">Process view</text>

  <!-- ══════ Tier 4: Topology ══════ -->

  <rect x="280" y="482" width="194" height="44" rx="8" fill="white" fill-opacity="0.55" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="1.5"/>
  <text x="377" y="500" text-anchor="middle" class="card-name">Whitney Stratification</text>
  <text x="377" y="516" text-anchor="middle" class="card-desc">Stratified view</text>

  <!-- ══════ Dependency arrows ══════ -->

  <!-- Linear Projection → Grassmannian (curve left around Directed Graph) -->
  <path d="M 50 152 C 20 200, 20 320, 80 358" fill="none" stroke="#94a3b8" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#dep-arrow)"/>

  <!-- Directed Graph → Causal Graph -->
  <path d="M 244 264 C 254 264, 262 264, 276 264" fill="none" stroke="#94a3b8" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#dep-arrow)"/>

  <!-- Causal Graph → Role Graph -->
  <path d="M 474 264 C 484 264, 492 264, 506 264" fill="none" stroke="#94a3b8" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#dep-arrow)"/>

  <!-- Grassmannian → Fiber Bundle -->
  <path d="M 244 384 C 254 384, 262 384, 276 384" fill="none" stroke="#94a3b8" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#dep-arrow)"/>

  <!-- Grassmannian → Whitney Stratification -->
  <path d="M 180 406 C 220 440, 310 470, 345 478" fill="none" stroke="#94a3b8" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#dep-arrow)"/>

  <!-- Fiber Bundle → Whitney Stratification -->
  <path d="M 377 406 C 377 430, 377 455, 377 478" fill="none" stroke="#94a3b8" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#dep-arrow)"/>

  <!-- Dynamical System → Whitney Stratification -->
  <path d="M 570 406 C 530 440, 440 470, 410 478" fill="none" stroke="#94a3b8" stroke-opacity="0.4" stroke-width="1.5" marker-end="url(#dep-arrow)"/>

  <!-- Bottom tagline -->
  <text x="450" y="560" text-anchor="middle" font-size="13" fill="#475569" font-weight="600" font-style="italic">Arrows show "builds on." Tiers indicate prerequisite mathematical background.</text>
</svg>
