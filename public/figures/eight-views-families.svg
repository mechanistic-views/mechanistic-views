<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1440 570" font-family="'Inter', 'Segoe UI', system-ui, -apple-system, sans-serif">
  <defs>
    <style>
      .family-label { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
      .view-name { font-size: 15px; font-weight: 600; fill: #1e293b; }
      .view-desc { font-size: 12.5px; fill: #475569; font-weight: 600; }
      .edge-label { font-size: 13.5px; fill: #1e293b; font-weight: 700; font-style: italic; }
      .cross-label { font-size: 14px; fill: #1e293b; font-weight: 700; }
      .section-label { font-size: 16px; font-weight: 700; letter-spacing: 0.3px; }
    </style>
    <marker id="arr-purple" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#a78bfa"/>
    </marker>
    <marker id="arr-blue" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#60a5fa"/>
    </marker>
    <marker id="arr-teal" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#2dd4bf"/>
    </marker>
    <marker id="arr-gray" markerWidth="7" markerHeight="5" refX="7" refY="2.5" orient="auto">
      <polygon points="0 0, 7 2.5, 0 5" fill="#64748b"/>
    </marker>
    <marker id="arr-gray-rev" markerWidth="7" markerHeight="5" refX="0" refY="2.5" orient="auto">
      <polygon points="7 0, 0 2.5, 7 5" fill="#64748b"/>
    </marker>
  </defs>

  <!-- Identity Family box -->
  <rect x="30" y="55" width="310" height="215" rx="12" fill="#7c3aed" fill-opacity="0.08" stroke="#7c3aed" stroke-opacity="0.4" stroke-width="2"/>
  <text x="185" y="42" text-anchor="middle" class="family-label" fill="#7c3aed">Identity Family</text>

  <rect x="55" y="80" width="260" height="62" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="185" y="106" text-anchor="middle" class="view-name">Object View</text>
  <text x="185" y="124" text-anchor="middle" class="view-desc">concrete parts: heads, neurons</text>

  <rect x="55" y="183" width="260" height="62" rx="8" fill="white" fill-opacity="0.55" stroke="#7c3aed" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="185" y="209" text-anchor="middle" class="view-name">Role View</text>
  <text x="185" y="227" text-anchor="middle" class="view-desc">functional roles, multiply realized</text>

  <line x1="185" y1="142" x2="185" y2="180" stroke="#a78bfa" stroke-width="1.5" marker-end="url(#arr-purple)"/>
  <text x="206" y="166" class="edge-label">inflation risk</text>

  <!-- Identity → Mathematical arrow -->
  <line x1="340" y1="162" x2="537" y2="162" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="438" y="150" text-anchor="middle" class="cross-label">components vs. geometry</text>

  <!-- Mathematical Family box -->
  <rect x="540" y="55" width="310" height="215" rx="12" fill="#3b82f6" fill-opacity="0.08" stroke="#3b82f6" stroke-opacity="0.4" stroke-width="2"/>
  <text x="695" y="42" text-anchor="middle" class="family-label" fill="#3b82f6">Mathematical Family</text>

  <rect x="565" y="80" width="260" height="62" rx="8" fill="white" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="695" y="106" text-anchor="middle" class="view-name">Subspace View</text>
  <text x="695" y="124" text-anchor="middle" class="view-desc">causal subspaces on Gr(k, d)</text>

  <rect x="565" y="183" width="260" height="62" rx="8" fill="white" fill-opacity="0.55" stroke="#3b82f6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="695" y="209" text-anchor="middle" class="view-name">Structural View</text>
  <text x="695" y="227" text-anchor="middle" class="view-desc">invariant weight structure</text>

  <line x1="695" y1="142" x2="695" y2="180" stroke="#60a5fa" stroke-width="1.5" marker-end="url(#arr-blue)"/>
  <text x="716" y="166" class="edge-label">gauge question</text>

  <!-- Mathematical → Process arrow -->
  <line x1="850" y1="162" x2="1097" y2="162" stroke="#64748b" stroke-width="1.5" marker-end="url(#arr-gray)"/>
  <text x="973" y="150" text-anchor="middle" class="cross-label">state vs. trajectory</text>

  <!-- Process Family box -->
  <rect x="1100" y="55" width="310" height="215" rx="12" fill="#14b8a6" fill-opacity="0.08" stroke="#14b8a6" stroke-opacity="0.4" stroke-width="2"/>
  <text x="1255" y="42" text-anchor="middle" class="family-label" fill="#14b8a6">Process Family</text>

  <rect x="1125" y="80" width="260" height="62" rx="8" fill="white" fill-opacity="0.55" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="1255" y="106" text-anchor="middle" class="view-name">Process View</text>
  <text x="1255" y="124" text-anchor="middle" class="view-desc">formation trajectories</text>

  <rect x="1125" y="183" width="260" height="62" rx="8" fill="white" fill-opacity="0.55" stroke="#14b8a6" stroke-opacity="0.35" stroke-width="1.5"/>
  <text x="1255" y="209" text-anchor="middle" class="view-name">Stratified View</text>
  <text x="1255" y="227" text-anchor="middle" class="view-desc">strata with varying identity</text>

  <line x1="1255" y1="142" x2="1255" y2="180" stroke="#2dd4bf" stroke-width="1.5" marker-end="url(#arr-teal)"/>
  <text x="1276" y="166" class="edge-label">resolution</text>

  <!-- Divider line -->
  <line x1="60" y1="325" x2="1380" y2="325" stroke="#cbd5e1" stroke-width="1"/>

  <!-- Bottom section labels -->
  <text x="370" y="358" text-anchor="middle" class="section-label" fill="#f59e0b">Methodological</text>
  <text x="1060" y="358" text-anchor="middle" class="section-label" fill="#f43f5e">Pragmatic</text>

  <!-- Perspectival View card -->
  <rect x="170" y="375" width="400" height="85" rx="10" fill="#f59e0b" fill-opacity="0.08" stroke="#f59e0b" stroke-opacity="0.4" stroke-width="2"/>
  <text x="370" y="410" text-anchor="middle" class="view-name">Perspectival View</text>
  <text x="370" y="431" text-anchor="middle" class="view-desc">methods as partial projections</text>

  <!-- "method vs. utility" bidirectional arrow -->
  <text x="715" y="405" text-anchor="middle" class="cross-label">method vs. utility</text>
  <line x1="573" y1="417" x2="857" y2="417" stroke="#64748b" stroke-width="1.5" stroke-dasharray="6,4" marker-start="url(#arr-gray-rev)" marker-end="url(#arr-gray)"/>

  <!-- Instrumental View card -->
  <rect x="860" y="375" width="400" height="85" rx="10" fill="#f43f5e" fill-opacity="0.08" stroke="#f43f5e" stroke-opacity="0.4" stroke-width="2"/>
  <text x="1060" y="410" text-anchor="middle" class="view-name">Instrumental View</text>
  <text x="1060" y="431" text-anchor="middle" class="view-desc">useful predictive models, not real objects</text>

  <!-- Bottom tagline -->
  <text x="720" y="505" text-anchor="middle" font-size="15" fill="#475569" font-weight="600" font-style="italic">The first six views make metaphysical commitments.</text>
  <text x="720" y="529" text-anchor="middle" font-size="15" fill="#475569" font-weight="600" font-style="italic">The perspectival and instrumental views are skeptical positions.</text>
</svg>
